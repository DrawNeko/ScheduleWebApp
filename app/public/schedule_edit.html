<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>スケジュール編集</title>
  <link rel="stylesheet" href="/assets/css/schedule_edit.css">
</head>

<body>

  <div class="container">
    <h1>スケジュール編集</h1>
    
    <!-- 編集フォーム（POST/PUT は JS 側で処理） -->
    <form id="editForm">

      <!-- 登録者（編集時は変更可能） -->
      <div class="form-row">
        <div class="form-group short">
          <label>登録者</label>
          <select id="createdBySelect" name="created_by" required></select>
        </div>

        <div class="form-group long">
          <label>同報者</label>
          <select id="participantsSelect"></select>
          <div id="chipContainer"></div>
        </div>
      </div>

      <!-- タイトル -->
      <div class="form-group">
        <label for="title">タイトル</label>
        <input type="text" id="title" name="title">
      </div>

      <!-- 予定日 + 時刻（横並び） -->
      <div class="form-row">
        <div class="form-group date-short">
          <label>予定日</label>
          <input type="date" id="date" name="date" required>
        </div>

        <div class="form-group time-block">
          <label>開始</label>
          <div class="time-inner">
            <select id="startHour" name="startHour" required></select>
            <select id="startMinute" name="startMinute" required></select>
          </div>
        </div>

        <div class="form-group time-block">
          <label>終了</label>
          <div class="time-inner">
            <select id="endHour" name="endHour" required></select>
            <select id="endMinute" name="endMinute" required></select>
          </div>
        </div>
      </div>

      <div class="form-group recurring-toggle">
        <label><input type="checkbox" id="isRecurring"> 定期予約を設定する</label>
      </div>

      <div id="recurringSection" class="recurring-section" style="display:none;">
        <div class="form-row">
          <div class="form-group date-short">
            <label>期間（終了日）</label>
            <input type="date" id="recurringEndDate">
          </div>

          <div class="form-group time-block">
            <label>頻度</label>
            <select id="recurringFrequency">
              <option value="DAILY">毎日（平日）</option>
              <option value="WEEKLY">毎週</option>
              <option value="BIWEEKLY">隔週</option>
            </select>
          </div>
        </div>
      </div>

      <p id="recurringSingleNote" class="recurring-single-note" style="display:none;">
        ※「定期予約を設定する」をOFFにすると、この日の予定のみ更新されます。元の定期予約との同期は解除され、以後は定期予約側を変更しても自動反映されません。
      </p>

      <!-- 場所 -->
      <div class="form-group">
        <label for="location">場所</label>
        <input type="text" id="location" name="location">
      </div>

      <!-- メモ -->
      <div class="form-group">
        <label for="memo">メモ</label>
        <textarea id="memo" name="memo"></textarea>
      </div>

      <!-- 色（背景色などに使用） -->
      <div class="form-group">
        <label for="colorSelect">色</label>
        <!-- JS で色一覧を動的に挿入 -->
        <select id="colorSelect" name="color_name"></select>
      </div>

      <!-- 更新ボタン -->
      <div class="btn-area">
        <button type="submit">更新</button>
        <button type="button" id="btnDelete" class="danger">削除</button>
        <button type="button" id="btnBack">トップへ戻る</button>
      </div>
    </form>
  </div>

  <div id="deleteModal" class="modal-overlay" style="display:none;" aria-hidden="true">
    <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="deleteModalTitle">
      <h2 id="deleteModalTitle">このスケジュールを削除しますか？</h2>
      <p class="modal-description">以下の内容を削除対象として処理します。</p>

      <div class="delete-target">
        <div><span>タイトル:</span> <strong id="deleteTargetTitle"></strong></div>
        <div><span>日時:</span> <strong id="deleteTargetDateTime"></strong></div>
        <div><span>場所:</span> <strong id="deleteTargetLocation"></strong></div>
      </div>

      <div id="deleteRecurringWrap" class="modal-checkbox" style="display:none;">
        <label>
          <input type="checkbox" id="deleteRecurringAll">
          定期予約ごと削除する（ON: 定期予約期間すべて / OFF: 対象日のみ）
        </label>
      </div>

      <div class="modal-actions">
        <button type="button" id="confirmDelete" class="danger">削除する</button>
        <button type="button" id="cancelDelete">キャンセル</button>
      </div>
    </div>
  </div>

  <!-- スケジュール編集画面専用 JS -->
  <script type="module" src="/assets/js/schedule_edit.js"></script>
</body>
</html>
