<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ユーザ登録</title>
  <link rel="stylesheet" href="/assets/css/user_register.css">
</head>

<body>
  <div class="container">
    <h1>ユーザ登録</h1>

    <form id="userForm">
      <div class="form-group">
        <label for="user_id">ユーザID</label>
        <input type="text" id="user_id" name="user_id" required>
      </div>

      <div class="form-group">
        <label for="name">ユーザ名</label>
        <input type="text" id="name" name="name" required>
      </div>

      <div class="form-group">
        <label for="email">メールアドレス</label>
        <input type="text" id="email" name="email">
      </div>

      <div class="form-group">
        <label for="role">ロール</label>
        <select id="role" name="role" required></select>
      </div>

      <div class="btn-area">
        <button type="button" id="btnCancel" class="btn-cancel">キャンセル</button>
        <button type="submit">登録</button>
      </div>
    </form>
  </div>
  <script type="module" src="/assets/js/user_register.js"></script>
</body>
</html>
