<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>週間スケジュール</title>
  <link rel="stylesheet" href="/assets/css/index.css">
</head>

<body>
  <header>
    <h1>週間スケジュール</h1>

    <div id="menu-bar">
      <button id="btnHamburgerMenu" type="button" aria-expanded="false" aria-controls="hamburgerMenuPanel" aria-label="メニュー">☰</button>
      <nav id="hamburgerMenuPanel" class="hidden" aria-label="ユーザーメニュー">
        <div id="loginUser" class="menu-user-info"></div>
        <button id="menuUserRegister" type="button">ユーザ登録</button>
        <button id="menuUserProfileEdit" type="button">ユーザ情報編集</button>
        <button id="menuUserMaintenance" type="button">ユーザメンテナンス</button>
        <button id="menuLogout" type="button">ログアウト</button>
      </nav>
    </div>

    <div id="group-bar">
      <label for="groupSelect">表示グループ</label>
      <select id="groupSelect"></select>
      <button id="btnSaveDefaultGroup" type="button">デフォルトに設定</button>
      <button id="btnEditGroups" type="button">編集</button>
    </div>

    <div id="week-controls">
      <button id="btnPrevWeek">1週前</button>
      <button id="btnPrevDay">1日前</button>
      <button id="btnThisWeek">今週</button>
      <button id="btnNextDay">1日後</button>
      <button id="btnNextWeek">1週先</button>
    </div>
  </header>

  <main>
    <div id="schedule-table-wrapper">
      <table id="schedule-table">
        <thead>
          <tr>
            <th class="member-col">メンバー</th>
            <th><span class="date" data-day="0"></span><br>(<span class="day-label" data-day="0"></span>)</th>
            <th><span class="date" data-day="1"></span><br>(<span class="day-label" data-day="1"></span>)</th>
            <th><span class="date" data-day="2"></span><br>(<span class="day-label" data-day="2"></span>)</th>
            <th><span class="date" data-day="3"></span><br>(<span class="day-label" data-day="3"></span>)</th>
            <th><span class="date" data-day="4"></span><br>(<span class="day-label" data-day="4"></span>)</th>
            <th><span class="date" data-day="5"></span><br>(<span class="day-label" data-day="5"></span>)</th>
            <th><span class="date" data-day="6"></span><br>(<span class="day-label" data-day="6"></span>)</th>
          </tr>
        </thead>

        <tbody id="member-rows">
          <!-- JS でメンバー行を生成 -->
        </tbody>
      </table>
    </div>
  </main>

  <script type="module" src="/assets/js/index.js"></script>
</body>
</html>
