<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ユーザ情報編集</title>
  <link rel="stylesheet" href="/assets/css/user_register.css">
</head>
<body>
  <div class="container">
    <h1>ユーザ情報編集</h1>
    <form id="profileForm">
      <div class="form-group">
        <label for="email">メールアドレス</label>
        <input type="text" id="email" name="email">
      </div>
      <div class="form-group">
        <label for="password">パスワード</label>
        <input type="password" id="password" name="password" required>
        <label class="password-visibility">
          <input type="checkbox" id="showPassword"> パスワードを表示
        </label>
      </div>
      <div class="btn-area">
        <button type="button" id="btnCancel" class="btn-cancel">キャンセル</button>
        <button type="submit">更新</button>
      </div>
    </form>
  </div>
  <script type="module" src="/assets/js/user_profile_edit.js"></script>
</body>
</html>
